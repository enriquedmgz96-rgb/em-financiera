version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financiera-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/Argentina/Cordoba
    ports:
      - "3001:3001"
    networks:
      - financiera-internal
      - existing-network

  frontend:
    image: nginx:1.25-alpine
    container_name: financiera-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - financiera-internal

networks:
  financiera-internal:
    driver: bridge
  existing-network:
    external: true
    name: ${DOCKER_NETWORK:-n8n_default}
