<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EM Financiera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Figtree:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=19" />
  <style>
    /* ── Login overlay ── */
    #loginOverlay {
      display: none;
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 60%, #1a3a2a 100%);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #loginOverlay.visible { display: flex; }
    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
    }
    .login-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: #1b4332;
      margin-bottom: .25rem;
    }
    .login-sub {
      font-size: .85rem;
      color: #888;
      margin-bottom: 1.75rem;
    }
    .login-box label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #555;
      margin-bottom: .35rem;
    }
    .login-box input {
      width: 100%;
      padding: .65rem .85rem;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: .97rem;
      margin-bottom: 1rem;
      font-family: inherit;
      transition: border-color .15s;
    }
    .login-box input:focus { outline: none; border-color: #1b4332; }
    .login-btn {
      width: 100%;
      background: #1b4332;
      color: white;
      border: none;
      border-radius: 7px;
      padding: .75rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      margin-top: .25rem;
    }
    .login-btn:hover { background: #2d6a4f; }
    #loginError {
      color: #c0392b;
      font-size: .85rem;
      margin-top: .75rem;
      min-height: 1.2em;
      text-align: center;
    }

    /* ── Usuario en navbar ── */
    .navbar-user {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-left: auto;
    }
    .navbar-user .user-chip {
      display: flex;
      align-items: center;
      gap: .4rem;
      background: rgba(255,255,255,.12);
      border-radius: 20px;
      padding: .25rem .7rem .25rem .45rem;
      font-size: .82rem;
      color: rgba(255,255,255,.9);
    }
    .navbar-user .user-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .75rem;
      color: white;
      flex-shrink: 0;
    }
    .navbar-user .btn-logout {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.8);
      border-radius: 6px;
      padding: .25rem .65rem;
      font-size: .78rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .navbar-user .btn-logout:hover { background: rgba(255,255,255,.2); color: white; }
  </style>
</head>
<body>

  <!-- Login overlay -->
  <div id="loginOverlay" class="visible">
    <div class="login-box">
      <div class="login-brand">EM Financiera</div>
      <div class="login-sub">Sistema de gestión de préstamos</div>
      <form id="loginForm" autocomplete="on">
        <label>Usuario</label>
        <input type="text" id="loginUser" name="username" autocomplete="username" placeholder="Usuario" />
        <label>Contraseña</label>
        <div style="position:relative">
          <input type="password" id="loginPass" name="password" autocomplete="current-password" placeholder="••••••••" style="padding-right:2.5rem" />
          <button type="button" onclick="togglePassword()" style="position:absolute;right:0;top:0;bottom:0;width:2.5rem;background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;color:#aaa" aria-label="Mostrar">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button type="submit" class="login-btn">Iniciar sesión</button>
        <div id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- App principal -->
  <nav class="navbar">
    <button class="nav-hamburger" id="navHamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <span class="brand">EM <span>Financiera</span></span>
    <div class="navbar-user" id="navbarUser"></div>
  </nav>

  <div class="app-shell">
    <!-- Sidebar con módulos y submódulos -->
    <aside class="sidebar" id="sidebar">
      <details class="nav-group" open>
        <summary>Vista general</summary>
        <a href="#" data-page="balance" class="active">Balance general</a>
        <a href="#" data-page="clientes">Socios <span class="nav-group-tag" style="background:#e7ecea;color:#1b4332">BP</span></a>
      </details>
      <details class="nav-group" open>
        <summary>Préstamos <span class="nav-group-tag">propio</span></summary>
        <a href="#" data-page="dash-prestamos">Dashboard</a>
        <a href="#" data-page="prestamos">Préstamos</a>
        <a href="#" data-page="pagos">Registrar pago</a>
        <a href="#" data-page="sim-prestamos">Tasas & Simulador</a>
      </details>
      <details class="nav-group" open>
        <summary>Plata de terceros <span class="nav-group-tag tag-azul">inversores</span></summary>
        <a href="#" data-page="dash-terceros">Dashboard</a>
        <a href="#" data-page="captaciones">Captaciones</a>
        <a href="#" data-page="devoluciones">Registrar devolución</a>
        <a href="#" data-page="sim-captaciones">Tasas & Simulador</a>
      </details>
      <details class="nav-group">
        <summary>Sistema</summary>
        <a href="#" data-page="usuarios">Usuarios</a>
        <a href="#" data-page="manual">Manual y conceptos</a>
      </details>
      <div id="drawerUser" class="sidebar-user"></div>
    </aside>

    <main id="app"></main>
  </div>
  <div class="nav-overlay" id="navOverlay"></div>

  <script src="/js/api.js?v=19"></script>
  <script src="/js/dashboard.js?v=19"></script>
  <script src="/js/balance.js?v=19"></script>
  <script src="/js/clientes.js?v=19"></script>
  <script src="/js/prestamos.js?v=19"></script>
  <script src="/js/pagos.js?v=19"></script>
  <script src="/js/simulador.js?v=19"></script>
  <script src="/js/usuarios.js?v=19"></script>
  <script src="/js/inversores.js?v=19"></script>
  <script src="/js/captaciones.js?v=19"></script>
  <script src="/js/devoluciones.js?v=19"></script>
  <script src="/js/manual.js?v=19"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('loginPass');
      const icon  = document.getElementById('eyeIcon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.innerHTML = show
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }

    // ── Auth ────────────────────────────────────────────────
    function mostrarLogin() {
      document.getElementById('loginOverlay').classList.add('visible');
      document.getElementById('navbarUser').innerHTML = '';
      document.getElementById('app').innerHTML = '';
    }

    function ocultarLogin(user) {
      document.getElementById('loginOverlay').classList.remove('visible');
      const inicial = (user.nombre || user.username || '?')[0].toUpperCase();
      const chipHTML = `
        <div class="user-chip">
          <div class="user-avatar">${inicial}</div>
          ${user.nombre || user.username}
        </div>
        <button class="btn-logout" onclick="logout()">Salir</button>
      `;
      document.getElementById('navbarUser').innerHTML = chipHTML;
      // Drawer user section (mobile)
      document.getElementById('drawerUser').innerHTML = `
        <span style="font-size:.85rem;color:var(--ink-2);font-weight:600">${user.nombre || user.username}</span>
        <button class="btn-logout" onclick="logout()" style="font-size:.78rem;padding:.3rem .7rem">Salir</button>
      `;
      navigate('balance');
    }

    function logout() {
      localStorage.removeItem('em_token');
      localStorage.removeItem('em_user');
      mostrarLogin();
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      try {
        const data = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        }).then(async r => {
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Error al iniciar sesión');
          return d;
        });
        localStorage.setItem('em_token', data.token);
        localStorage.setItem('em_user', JSON.stringify({ username: data.username, nombre: data.nombre }));
        ocultarLogin(data);
      } catch (err) {
        errEl.textContent = err.message;
      }
    });

    // ── Navegación ────────────────────────────────────────────
    const pages = {
      balance:          renderBalance,
      clientes:         renderClientes,
      'dash-prestamos': renderDashboardPrestamos,
      prestamos:        renderPrestamos,
      pagos:            renderPagos,
      'sim-prestamos':  renderSimuladorPrestamos,
      'dash-terceros':  renderDashboardTerceros,
      'sim-captaciones': renderSimuladorCaptaciones,
      inversores:       renderInversores,
      captaciones:      renderCaptaciones,
      devoluciones:     renderDevoluciones,
      usuarios:         renderUsuarios,
      manual:           renderManual,
    };

    function navigate(page) {
      document.querySelectorAll('.sidebar a').forEach(a => {
        const activo = a.dataset.page === page;
        a.classList.toggle('active', activo);
        // Abrir el grupo que contiene la página activa
        if (activo) { const g = a.closest('.nav-group'); if (g) g.open = true; }
      });
      closeDrawer();
      pages[page]();
    }

    document.querySelectorAll('.sidebar a').forEach(a => {
      a.addEventListener('click', e => { e.preventDefault(); navigate(a.dataset.page); });
    });

    // ── Hamburger / Sidebar (off-canvas en mobile) ────────────
    const hamburger = document.getElementById('navHamburger');
    const drawer    = document.getElementById('sidebar');
    const overlay   = document.getElementById('navOverlay');

    function openDrawer() {
      drawer.classList.add('open');
      overlay.classList.add('open');
      hamburger.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
      hamburger.classList.remove('open');
      document.body.style.overflow = '';
    }

    hamburger.addEventListener('click', () => drawer.classList.contains('open') ? closeDrawer() : openDrawer());
    overlay.addEventListener('click', closeDrawer);

    // ── Inicializar ───────────────────────────────────────────
    const savedToken = localStorage.getItem('em_token');
    const savedUser  = localStorage.getItem('em_user');

    if (savedToken && savedUser) {
      // Verificar que el token aún es válido
      fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${savedToken}` } })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(user => ocultarLogin(user))
        .catch(() => mostrarLogin());
    } else {
      mostrarLogin();
    }
  </script>
</body>
</html>
