<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EM Financiera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <span class="brand">EM <span>Financiera</span></span>
    <div class="nav-links">
      <a href="#" data-page="dashboard" class="active">Dashboard</a>
      <a href="#" data-page="clientes">Clientes</a>
      <a href="#" data-page="prestamos">Préstamos</a>
      <a href="#" data-page="pagos">Registrar Pago</a>
      <a href="#" data-page="simulador">Tasas & Simulador</a>
    </div>
  </nav>

  <main id="app"></main>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/clientes.js"></script>
  <script src="/js/prestamos.js"></script>
  <script src="/js/pagos.js"></script>
  <script src="/js/simulador.js"></script>
  <script>
    const pages = { dashboard: renderDashboard, clientes: renderClientes, prestamos: renderPrestamos, pagos: renderPagos, simulador: renderSimulador };

    function navigate(page) {
      document.querySelectorAll('.nav-links a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
      pages[page]();
    }

    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', e => { e.preventDefault(); navigate(a.dataset.page); });
    });

    navigate('dashboard');
  </script>
</body>
</html>
